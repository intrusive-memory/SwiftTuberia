name: Ensure Model on CDN (Midnight)

on:
  schedule:
    - cron: '0 0 * * *'  # Midnight UTC
  workflow_dispatch:

concurrency:
  group: ensure-model-cdn
  cancel-in-progress: false

jobs:
  ensure-model-cdn:
    name: Upload ${{ matrix.model.id }} to CDN
    runs-on: macos-26
    timeout-minutes: 240

    strategy:
      matrix:
        model:
          - id: t5-xxl-encoder-int4
            repo: intrusive-memory/t5-xxl-int4-mlx
            slug: intrusive-memory_t5-xxl-int4-mlx
          - id: sdxl-vae-decoder-fp16
            repo: intrusive-memory/sdxl-vae-fp16-mlx
            slug: intrusive-memory_sdxl-vae-fp16-mlx

    env:
      MODEL_ID: ${{ matrix.model.id }}
      MODEL_REPO: ${{ matrix.model.repo }}
      MODEL_SLUG: ${{ matrix.model.slug }}
      CDN_BASE: ${{ secrets.CDN_BASE_URL }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install acervo
        run: |
          brew tap intrusive-memory/acervo https://github.com/intrusive-memory/homebrew-acervo.git
          brew install acervo

      - name: Check if manifest exists on CDN (idempotency)
        run: |
          MANIFEST_URL="${{ env.CDN_BASE }}/${{ env.MODEL_SLUG }}/manifest.json"
          if curl -sf "$MANIFEST_URL" > /dev/null 2>&1; then
            echo "✅ Model ${{ env.MODEL_ID }} already on CDN"
            exit 0
          fi
          echo "⭕ Model ${{ env.MODEL_ID }} not found on CDN, proceeding with upload"

      - name: Download model from HuggingFace
        run: |
          mkdir -p /tmp/models/${{ env.MODEL_SLUG }}
          acervo download \
            --repo "${{ env.MODEL_REPO }}" \
            --output "/tmp/models/${{ env.MODEL_SLUG }}"

      - name: Compute SHA-256 manifest
        run: |
          cd /tmp/models/${{ env.MODEL_SLUG }}
          acervo manifest create \
            --output manifest.json

      - name: Upload to CDN with manifest
        run: |
          acervo upload \
            --bucket "${{ env.R2_BUCKET }}" \
            --account-id "${{ env.R2_ACCOUNT_ID }}" \
            --access-key "${{ env.R2_ACCESS_KEY_ID }}" \
            --secret-key "${{ env.R2_SECRET_ACCESS_KEY }}" \
            --source "/tmp/models/${{ env.MODEL_SLUG }}" \
            --destination "${{ env.MODEL_SLUG }}"

      - name: Verify upload
        run: |
          MANIFEST_URL="${{ env.CDN_BASE }}/${{ env.MODEL_SLUG }}/manifest.json"
          if curl -sf "$MANIFEST_URL" > /dev/null; then
            echo "✅ Model ${{ env.MODEL_ID }} successfully uploaded to CDN"
          else
            echo "❌ Failed to verify upload"
            exit 1
          fi

      # Verification contract (REQ-CDN-01, S7):
      #
      # After confirming the manifest exists on the CDN, we download it and run
      # VerifyComponentManifest — a SwiftPM executable built from
      # Tools/VerifyComponentManifest/main.swift — against the source-of-truth
      # descriptors in Sources/TuberiaCatalog/Registration/CatalogRegistration.swift.
      #
      # The tool compares every file entry's sha256 and sizeBytes against the
      # values registered in CatalogRegistration. Any divergence causes a
      # diff-style error on stderr and a non-zero exit code, failing this job.
      #
      # This prevents "checksum drift" where CatalogRegistration.swift and the
      # live CDN manifest disagree (e.g. after a re-upload or a source edit).
      - name: Verify manifest matches source
        run: |
          # Download the live manifest from the CDN into a temp file.
          MANIFEST_URL="${{ env.CDN_BASE }}/${{ env.MODEL_SLUG }}/manifest.json"
          MANIFEST_TMP="$(mktemp /tmp/manifest-XXXXXX.json)"
          echo "Downloading manifest from $MANIFEST_URL"
          curl -sf "$MANIFEST_URL" -o "$MANIFEST_TMP"

          # Build the VerifyComponentManifest tool from source.
          # This ensures the binary is always built against the checked-out
          # CatalogRegistration.swift, not a cached or stale binary.
          xcodebuild build \
            -scheme VerifyComponentManifest \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath /tmp/tuberia-derived-data \
            | tail -5

          TOOL=/tmp/tuberia-derived-data/Build/Products/Debug/VerifyComponentManifest

          # Cross-check: exits 0 on full match, exits 1 on any divergence
          # (the tool prints a diff-style report to stderr naming component,
          # path, expected vs actual sha256 / sizeBytes).
          "$TOOL" "$MANIFEST_TMP"

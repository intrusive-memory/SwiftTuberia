name: Tests

on:
  pull_request:
    branches: [main, development]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-macos:
    name: Test on macOS
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: |
          xcodebuild build \
            -scheme Tuberia \
            -destination 'platform=macOS,arch=arm64'

      - name: Test (non-GPU)
        run: |
          xcodebuild test \
            -scheme SwiftTuberia-Package \
            -destination 'platform=macOS,arch=arm64' \
            -only-testing:TuberiaTests \
            -only-testing:TuberiaCatalogTests

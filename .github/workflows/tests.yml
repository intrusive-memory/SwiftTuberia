name: Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main, development]

env:
  ACERVO_APP_GROUP_ID: group.intrusive-memory.models

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-macos:
    name: Test on macOS
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: |
          xcodebuild build \
            -scheme Tuberia \
            -destination 'platform=macOS,arch=arm64'

      - name: Test (non-GPU)
        # -parallel-testing-enabled NO: MLX's Metal GPU stream is
        # process-global and Swift Testing's default cross-suite
        # parallelism races on the shared command buffer.
        run: |
          xcodebuild test \
            -scheme SwiftTuberia-Package \
            -destination 'platform=macOS,arch=arm64' \
            -parallel-testing-enabled NO \
            -only-testing:TuberiaTests \
            -only-testing:TuberiaCatalogTests
